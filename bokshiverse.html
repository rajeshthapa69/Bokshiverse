<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link href="https://fonts.cdnfonts.com/css/cubano" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="bokshiverse.css">
    <script src="bokshiverse.js" async defer></script>
    <title>Bokshiverse</title>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="nav">
                <div class="pp" style="border: 2px solid #a855f7;">
                    <img src="" alt="" id="img">
                </div>
                <div class="identity">
                    <div class="name" id="ppname"></div>
                    <div class="activeStatus">Active Now <i class="fa-solid fa-circle-dot dot" style="font-size: 10px; color: greenyellow;"></i></div>
                </div>
                <div class="logOut" onclick="location.href = 'logIn.html'">
                    <button>Logout</button>
                </div>
            </div>
            <div class="search">
                <div class="inputSearch"><input type="text" placeholder="Search you Friend" id="input" spellcheck="true"></div>
                <div class="searchButton" id="search"><i class="fa-solid fa-search"></i></div>
            </div>
            <div class="users">
                <div class="user" onclick= "redirect();">
                    <div class="pp">
                        <img src="rajesh.jpg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Rajesh Thapa</div>
                        <div class="previewMessage">It is What it Is.</div>
                    </div>
                    <div><span class="material-symbols-outlined" class="span">verified</span></div>
                </div>
                <div class="user">
                    <div class="pp">
                        <img src="osama.jpg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Osama Bin Laden</div>
                        <div class="previewMessage">Allah hu Akbar, Bismillah rahm...</div>
                    </div>
                </div>
                <div class="user">
                    <div class="pp">
                        <img src="hitler.jpg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Adolf Hitler</div>
                        <div class="previewMessage">i will Conquer the World, No m...</div>
                    </div>
                </div>
                <div class="user">
                    <div class="pp">
                        <img src="albert.jpg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Albert Einstein</div>
                        <div class="previewMessage">Imagination is more important...</div>
                    </div>
                </div>
                <div class="user">
                    <div class="pp">
                        <img src="socrates.jpg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Socrates</div>
                        <div class="previewMessage">To know, is to know that you...</div>
                    </div>
                </div>
                <div class="user">
                    <div class="pp">
                        <img src="nepolean.jpeg" alt="">
                    </div>
                    <div class="identity">
                        <div class="name">Napoléon Bonaparte</div>
                        <div class="previewMessage">There is Nothing we Can Do.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
