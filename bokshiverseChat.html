<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/cubano" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="bokshiverseChat.css">
    <script src="bokshiverseChat.js" async defer></script>
    <title>BokshiverseChat</title>
</head>
<body>
    <video id="video" autoplay></video>
    <div class="container">
        <div class="box">
            <div class="nav">
                <div class="back">
                    <a href="bokshiverse.html"><i class="fa-solid fa-arrow-left"></i></a>
                </div>
                <div class="pp">
                    <img src="rajesh.jpg" alt="">
                </div>
                <div class="identity">
                    <div class="name">Rajesh Thapa</div>
                    <div class="activeStatus">Active Now <i class="fa-solid fa-circle-dot dot" style="font-size: 10px; color: greenyellow;"></i></div>
                </div>
                <div class="videoCall">
                    <button class="vc" onclick="videoCall();"><i class="fa-solid fa-video"></i></button>
                </div>
            </div>
            <div class="messageBox">
                <div class="message">
                    <div class="inComingMessage">
                        <p>It is What it Is.</p>
                    </div>
                    <div class="outGoingMessage" id="outGoingMessage">
                    </div>
                </div>
            </div>
        </div>
            <div class="messageWnS">
                <div class="messageW">
                    <input type="text" name="" id="message" placeholder="Type your message" required spellcheck="true">
                </div>
                <div class="messageS">
                    <button id="send"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
    </div>
</body>
</html>
