<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokshiverse Signup</title>
    <link href="https://fonts.cdnfonts.com/css/cubano" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="signUp.css">
    <script src="signUp.js" async defer></script>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="title">BOKSHI<span>VERSE</span></div>
            <form action="" onsubmit="submit">
                <div class="boxBody">
                    <div class="name">
                        <div class="fname">
                            <label for="">First Name</label>
                            <input type="text" placeholder="First name" required id="fname">
                        </div>
                        <div class="lname">
                            <label for="">Last Name</label>
                            <input type="text" placeholder="Last name" required id="lname">
                        </div>
                    </div>
                    <div class="email">
                        <label for="">Email Address</label>
                            <input type="email" style="width: 270px;" placeholder="Enter your email" required id="email">
                    </div>
                    <div class="password">
                        <i class="fa-solid fa-eye" id="eyeOpen"></i>
                        <i class="fa-solid fa-eye-slash" id="eyeClose"></i>
                        <label for="">Password</label>
                            <input type="password" id="password" style="width: 270px;" placeholder="Enter your password" required>
                    </div>
                    <div class="pp">
                        <label for>Choose Your Profile Picture</label>
                        <input type="file" style="width: 270px;border: none;" id="file" required>
                    </div>
                    <div class="continue">
                        <button id="cTc">Continue to Chat</button>
                    </div>
                    <div class="acntStatus">
                        <p>Already signed up ? <a href="logIn.html">Login now</a></p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
