<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/cubano" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="logIn.css">
    <script src="logIn.js" async defer></script>
    <title>logIn</title>
</head>
<body>
    <div class="container">
        <div class="box" id="box">
            <div class="title">BOKSHI<span>VERSE</span></div>
            <form action="">
                <div class="boxBody">
                    <div class="error" id="error"><span class="fa-solid fa-triangle-exclamation" style="color: black; padding-right: 5px;"></span> Your Credential Didn't Matched</div>
                    <div class="email">
                        <label for="">Email Address</label>
                            <input type="email" style="width: 270px;" placeholder="Enter your email" required id="email">
                    </div>
                    <div class="password">
                        <i class="fa-solid fa-eye" id="eyeOpen"></i>
                        <i class="fa-solid fa-eye-slash" id="eyeClose"></i>
                        <label for="">Password</label>
                            <input type="password" id="password" style="width: 270px;" placeholder="Enter your password" required>
                    </div>
                    <div class="continue">
                        <button id="cTc">Continue to Chat</button>
                    </div>
                    <div class="acntStatus">
                        <p>Don't Have Account ? <a href="index.html">Signup now</a></p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
