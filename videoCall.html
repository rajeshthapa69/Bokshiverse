<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/cubano" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="signUp.css">
    <link rel="stylesheet" href="videoCall.css">
    <script src="logIn.js" async defer></script>
    <title>BokshiverseVideoCall</title>
    <style>
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <div class="title">BOKSHI<span>VERSE</span></div>
            <div class="boxBody">
                <div class="peer2div"><video id="peer2" autoplay></video></div>
                <div class="peer1div"><video id="pear1" autoplay></video></div>
                <div class="controls">
                    <div class="mute"><i class="fa-solid fa-microphone"></i></div>
                    <div class="callEnd" onclick="cEnd();"><i class="fa-solid fa-tty"></i></div>
                    <div class="blockVideo"><i class="fa-solid fa-video"></i></div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    function cEnd(){
        navigator.vibrate(500000);
    setTimeout(function(){
        location.href = "bokshiverseChat.html";
    },200);
    }
    navigator.mediaDevices.getUserMedia({
        video: {
            width: 1300,
        },
        audio: true
    }).then(stream =>{
        document.getElementById("pear1").srcObject = stream;
    });
</script>
</html>
